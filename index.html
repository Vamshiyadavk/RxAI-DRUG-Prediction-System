<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RxAI — Drug Prediction</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />

  <!-- React 18 + Babel (no build step needed) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
/* ═══════════════════════════════════════════
   DESIGN TOKENS
═══════════════════════════════════════════ */
:root {
  --c-bg       : #f4f6fb;
  --c-surface  : #ffffff;
  --c-surface2 : #f8f9ff;
  --c-border   : #e4e8f4;
  --c-border2  : #ccd3f0;
  --c-primary  : #4f46e5;
  --c-primary-l: #6366f1;
  --c-primary-d: #3730a3;
  --c-accent   : #06b6d4;
  --c-success  : #059669;
  --c-warning  : #d97706;
  --c-danger   : #dc2626;
  --c-text     : #0f172a;
  --c-text2    : #475569;
  --c-text3    : #94a3b8;
  --c-text4    : #cbd5e1;
  --mono       : 'JetBrains Mono', monospace;
  --sans       : 'Outfit', sans-serif;
  --radius     : 14px;
  --radius-lg  : 20px;
  --radius-xl  : 28px;
  --shadow     : 0 1px 3px rgba(15,23,42,.06), 0 4px 16px rgba(79,70,229,.06);
  --shadow-lg  : 0 4px 6px rgba(15,23,42,.06), 0 12px 40px rgba(79,70,229,.1);
}

/* ═══════════════════════════════════════════
   BASE
═══════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--sans);
  background: var(--c-bg);
  color: var(--c-text);
  min-height: 100vh;
  line-height: 1.6;
}
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--c-bg); }
::-webkit-scrollbar-thumb { background: var(--c-border2); border-radius: 3px; }

/* ═══════════════════════════════════════════
   NAVBAR
═══════════════════════════════════════════ */
.navbar {
  background: var(--c-surface);
  border-bottom: 1px solid var(--c-border);
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 1px 0 var(--c-border);
}
.navbar-inner {
  max-width: 1200px; margin: 0 auto;
  padding: 0 28px; height: 62px;
  display: flex; align-items: center; justify-content: space-between;
}
.logo {
  font-size: 1.35rem; font-weight: 800;
  letter-spacing: -0.03em; color: var(--c-primary);
  display: flex; align-items: center; gap: 9px;
}
.logo-icon {
  width: 34px; height: 34px; border-radius: 9px;
  background: linear-gradient(135deg, var(--c-primary), var(--c-accent));
  display: flex; align-items: center; justify-content: center;
  font-size: 17px;
}
.logo-text { color: var(--c-text); }
.logo-text span { color: var(--c-primary); }
.navbar-badge {
  font-family: var(--mono); font-size: 11px;
  background: #eef2ff; color: var(--c-primary);
  border: 1px solid #c7d2fe;
  padding: 5px 13px; border-radius: 100px;
}

/* ═══════════════════════════════════════════
   HERO
═══════════════════════════════════════════ */
.hero {
  background: linear-gradient(160deg, #ffffff 0%, #f0f4ff 100%);
  border-bottom: 1px solid var(--c-border);
  padding: 64px 28px 52px;
  text-align: center;
}
.hero-pill {
  display: inline-flex; align-items: center; gap: 7px;
  font-family: var(--mono); font-size: 11px; letter-spacing: .1em;
  text-transform: uppercase; color: var(--c-primary);
  background: #eef2ff; border: 1px solid #c7d2fe;
  padding: 6px 15px; border-radius: 100px;
  margin-bottom: 22px;
}
.hero-pill-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--c-primary);
  animation: blink 2s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
.hero h1 {
  font-size: clamp(2rem, 5vw, 3.4rem);
  font-weight: 800; letter-spacing: -0.04em;
  line-height: 1.1; margin-bottom: 16px;
  color: var(--c-text);
}
.hero h1 em { font-style: normal; color: var(--c-primary); }
.hero p {
  font-size: 1.05rem; color: var(--c-text2);
  max-width: 520px; margin: 0 auto 36px; font-weight: 400;
}
.stat-row {
  display: inline-flex; gap: 0;
  border: 1px solid var(--c-border);
  border-radius: var(--radius-lg);
  background: var(--c-surface);
  overflow: hidden;
  box-shadow: var(--shadow);
}
.stat-item {
  padding: 14px 28px; text-align: center;
  border-right: 1px solid var(--c-border);
}
.stat-item:last-child { border-right: none; }
.stat-val {
  font-family: var(--mono); font-size: 1.35rem; font-weight: 500;
  color: var(--c-primary); display: block; line-height: 1;
}
.stat-lbl {
  font-size: 11px; color: var(--c-text3);
  text-transform: uppercase; letter-spacing: .08em;
  margin-top: 4px; display: block;
}

/* ═══════════════════════════════════════════
   MAIN GRID
═══════════════════════════════════════════ */
.page-wrap {
  max-width: 1200px; margin: 0 auto;
  padding: 36px 28px 80px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
  align-items: start;
}
@media (max-width: 820px) { .page-wrap { grid-template-columns: 1fr; } }

/* ═══════════════════════════════════════════
   CARD
═══════════════════════════════════════════ */
.card {
  background: var(--c-surface);
  border: 1px solid var(--c-border);
  border-radius: var(--radius-xl);
  box-shadow: var(--shadow);
  overflow: hidden;
}
.card-head {
  padding: 20px 24px;
  border-bottom: 1px solid var(--c-border);
  display: flex; align-items: center; gap: 12px;
  background: var(--c-surface2);
}
.card-head-icon {
  width: 40px; height: 40px; border-radius: 11px;
  background: linear-gradient(135deg, #eef2ff, #e0e7ff);
  border: 1px solid #c7d2fe;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0;
}
.card-head-title { font-size: 15px; font-weight: 700; color: var(--c-text); }
.card-head-sub {
  font-family: var(--mono); font-size: 10px;
  color: var(--c-text3); margin-top: 2px;
}
.card-body { padding: 26px; }

/* ═══════════════════════════════════════════
   FORM ELEMENTS
═══════════════════════════════════════════ */
.field { margin-bottom: 20px; }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.field-label {
  display: block; font-size: 11px; font-weight: 600;
  text-transform: uppercase; letter-spacing: .1em;
  color: var(--c-text3); margin-bottom: 7px;
  font-family: var(--mono);
}
.field-input, .field-select {
  width: 100%;
  background: var(--c-bg);
  border: 1.5px solid var(--c-border);
  border-radius: var(--radius);
  color: var(--c-text);
  font-family: var(--sans); font-size: 14px; font-weight: 500;
  padding: 11px 14px;
  outline: none;
  transition: border-color .2s, box-shadow .2s, background .2s;
  appearance: none;
}
.field-input:focus, .field-select:focus {
  border-color: var(--c-primary);
  background: var(--c-surface);
  box-shadow: 0 0 0 3px rgba(79,70,229,.12);
}
.select-wrap { position: relative; }
.select-arrow {
  position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
  pointer-events: none; color: var(--c-text3); font-size: 11px;
}

/* sex toggle */
.toggle-row { display: flex; gap: 8px; }
.toggle-btn {
  flex: 1; padding: 10px 12px;
  border: 1.5px solid var(--c-border);
  border-radius: var(--radius);
  background: var(--c-bg);
  color: var(--c-text2); font-family: var(--sans);
  font-size: 13px; font-weight: 600;
  cursor: pointer; transition: all .18s;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.toggle-btn.on {
  background: #eef2ff; border-color: var(--c-primary);
  color: var(--c-primary);
  box-shadow: 0 0 0 3px rgba(79,70,229,.1);
}

/* Na/K slider */
.nak-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.nak-num { font-family: var(--mono); font-size: 17px; font-weight: 500; color: var(--c-primary); }
.slider {
  width: 100%; appearance: none;
  height: 5px; border-radius: 100px;
  outline: none; cursor: pointer;
  background: linear-gradient(to right, var(--c-primary) var(--fill, 30%), var(--c-border2) var(--fill, 30%));
}
.slider::-webkit-slider-thumb {
  appearance: none; width: 20px; height: 20px;
  border-radius: 50%; background: var(--c-surface);
  border: 3px solid var(--c-primary);
  box-shadow: 0 2px 8px rgba(79,70,229,.3);
  cursor: pointer; transition: transform .15s;
}
.slider::-webkit-slider-thumb:hover { transform: scale(1.2); }
.nak-scale {
  display: flex; justify-content: space-between; margin-top: 5px;
  font-family: var(--mono); font-size: 9px; color: var(--c-text3);
}

/* predict button */
.btn-predict {
  width: 100%; padding: 15px;
  background: linear-gradient(135deg, var(--c-primary), var(--c-primary-l));
  border: none; border-radius: var(--radius);
  color: #fff; font-family: var(--sans);
  font-size: 15px; font-weight: 700;
  cursor: pointer; letter-spacing: .01em;
  transition: transform .15s, box-shadow .2s, opacity .2s;
  display: flex; align-items: center; justify-content: center; gap: 9px;
  margin-top: 6px;
}
.btn-predict:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 8px 28px rgba(79,70,229,.35);
}
.btn-predict:active:not(:disabled) { transform: translateY(0); }
.btn-predict:disabled { opacity: .6; cursor: not-allowed; }

.spinner {
  width: 18px; height: 18px;
  border: 2.5px solid rgba(255,255,255,.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* error */
.error-msg {
  margin-top: 12px; padding: 12px 14px;
  background: #fef2f2; border: 1px solid #fecaca;
  border-radius: var(--radius); font-size: 13px; color: var(--c-danger);
  display: flex; gap: 8px; align-items: flex-start; line-height: 1.5;
}

/* ═══════════════════════════════════════════
   RESULT CARD
═══════════════════════════════════════════ */
.result-in { animation: fadeUp .4s cubic-bezier(.16,1,.3,1); }
@keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:none} }

/* confidence donut */
.donut-wrap {
  display: flex; flex-direction: column; align-items: center;
  padding: 28px 0 16px;
}
.donut-ring { position: relative; width: 130px; height: 130px; }
.donut-svg { transform: rotate(-90deg); }
.donut-track { fill: none; stroke: var(--c-border); stroke-width: 10; }
.donut-fill {
  fill: none; stroke-width: 10; stroke-linecap: round;
  stroke: url(#donutGrad);
  transition: stroke-dashoffset 1.2s cubic-bezier(.16,1,.3,1);
}
.donut-center {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
}
.donut-pct { font-family: var(--mono); font-size: 24px; font-weight: 500; color: var(--c-primary); }
.donut-sub { font-size: 9px; text-transform: uppercase; letter-spacing: .1em; color: var(--c-text3); }

.drug-title {
  font-size: 1.3rem; font-weight: 800; letter-spacing: -.02em;
  color: var(--c-text); text-align: center; margin: 10px 0 8px;
  line-height: 1.25;
}
.tag-row { display: flex; justify-content: center; flex-wrap: wrap; gap: 6px; margin-bottom: 20px; }
.tag {
  font-family: var(--mono); font-size: 10px; letter-spacing: .05em;
  padding: 4px 12px; border-radius: 100px; font-weight: 500;
}
.tag-purple { background: #eef2ff; border: 1px solid #c7d2fe; color: var(--c-primary); }
.tag-cyan   { background: #ecfeff; border: 1px solid #a5f3fc; color: #0891b2; }
.tag-green  { background: #ecfdf5; border: 1px solid #a7f3d0; color: var(--c-success); }

.inner-body { padding: 0 24px 24px; }

.section-title {
  font-family: var(--mono); font-size: 10px; text-transform: uppercase;
  letter-spacing: .12em; color: var(--c-text3);
  display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
}
.section-title::after { content: ''; flex: 1; height: 1px; background: var(--c-border); }

.desc-block {
  background: var(--c-surface2); border: 1px solid var(--c-border);
  border-radius: var(--radius); padding: 14px 16px;
  font-size: 13px; line-height: 1.75; color: var(--c-text2);
  max-height: 155px; overflow-y: auto; margin-bottom: 20px;
}
.desc-block::-webkit-scrollbar { width: 3px; }
.desc-block::-webkit-scrollbar-thumb { background: var(--c-border2); border-radius: 2px; }

/* alt list */
.alt-list { display: flex; flex-direction: column; gap: 8px; }
.alt-item {
  display: flex; align-items: center; gap: 10px;
  background: var(--c-surface2); border: 1px solid var(--c-border);
  border-radius: var(--radius); padding: 10px 14px;
  transition: border-color .18s;
}
.alt-item:first-child { background: #f5f3ff; border-color: #c7d2fe; }
.alt-item:hover { border-color: var(--c-border2); }
.alt-rank { font-family: var(--mono); font-size: 10px; color: var(--c-text3); min-width: 20px; }
.alt-info { flex: 1; }
.alt-name { font-size: 13px; font-weight: 600; color: var(--c-text); line-height: 1.3; }
.alt-cls  { font-size: 11px; color: var(--c-text3); margin-top: 1px; }
.alt-right { text-align: right; flex-shrink: 0; }
.alt-pct  { font-family: var(--mono); font-size: 13px; font-weight: 500; color: var(--c-primary); }
.alt-bar  { width: 58px; height: 3px; background: var(--c-border); border-radius: 100px; margin-top: 4px; }
.alt-bar-fill { height: 100%; border-radius: 100px; background: linear-gradient(to right, var(--c-primary), var(--c-accent)); transition: width .9s ease; }

/* empty state */
.empty {
  min-height: 390px; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center; gap: 14px; padding: 20px;
}
.empty-icon {
  width: 78px; height: 78px; border-radius: 50%;
  background: #f0f4ff; border: 1.5px dashed #c7d2fe;
  display: flex; align-items: center; justify-content: center; font-size: 30px;
}
.empty-title { font-size: 16px; font-weight: 700; color: var(--c-text2); }
.empty-sub   { font-size: 13px; color: var(--c-text3); max-width: 230px; line-height: 1.6; }

/* model footer */
.model-bar {
  border-top: 1px solid var(--c-border); padding: 13px 22px;
  display: flex; flex-wrap: wrap; gap: 16px;
  background: var(--c-surface2);
}
.mbar-item { font-family: var(--mono); font-size: 10px; color: var(--c-text3); display: flex; gap: 5px; }
.mbar-val  { color: var(--c-primary); font-weight: 500; }

/* ═══════════════════════════════════════════
   HOW IT WORKS
═══════════════════════════════════════════ */
.how-section { max-width: 1200px; margin: 0 auto; padding: 0 28px 80px; }
.how-title {
  font-size: 1.75rem; font-weight: 800; letter-spacing: -.03em;
  text-align: center; margin-bottom: 6px; color: var(--c-text);
}
.how-sub {
  text-align: center; font-family: var(--mono); font-size: 11px;
  color: var(--c-text3); letter-spacing: .08em; margin-bottom: 32px;
}
.how-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; }
.how-card {
  background: var(--c-surface); border: 1px solid var(--c-border);
  border-radius: var(--radius-lg); padding: 24px;
  transition: box-shadow .2s, transform .2s;
}
.how-card:hover { box-shadow: var(--shadow-lg); transform: translateY(-2px); }
.how-num { font-family: var(--mono); font-size: 10px; color: var(--c-primary); letter-spacing: .1em; margin-bottom: 10px; }
.how-card h3 { font-size: 14px; font-weight: 700; color: var(--c-text); margin-bottom: 8px; }
.how-card p  { font-size: 12.5px; color: var(--c-text2); line-height: 1.65; }

/* ═══════════════════════════════════════════
   FOOTER
═══════════════════════════════════════════ */
.site-footer {
  background: var(--c-surface); border-top: 1px solid var(--c-border);
  padding: 20px 28px;
  display: flex; justify-content: space-between; align-items: center;
  flex-wrap: wrap; gap: 10px;
}
.site-footer-logo { font-weight: 800; font-size: 14px; color: var(--c-primary); }
.site-footer-note { font-family: var(--mono); font-size: 10px; color: var(--c-text3); }
</style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;
const API = window.location.origin;

/* ── Confidence Donut ──────────────────────────── */
function Donut({ pct }) {
  const R = 55, circ = 2 * Math.PI * R;
  const offset = circ - (pct / 100) * circ;
  const [displayed, setDisplayed] = useState(0);
  const [dashOffset, setDashOffset] = useState(circ);

  useEffect(() => {
    const raf = requestAnimationFrame(() => {
      setDashOffset(offset);
      let cur = 0;
      const step = pct / 60;
      const t = setInterval(() => {
        cur = Math.min(cur + step, pct);
        setDisplayed(Math.round(cur));
        if (cur >= pct) clearInterval(t);
      }, 16);
    });
    return () => cancelAnimationFrame(raf);
  }, [pct]);

  return (
    <div className="donut-ring">
      <svg className="donut-svg" width="130" height="130" viewBox="0 0 130 130">
        <defs>
          <linearGradient id="donutGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%"   stopColor="#4f46e5"/>
            <stop offset="100%" stopColor="#06b6d4"/>
          </linearGradient>
        </defs>
        <circle className="donut-track" cx="65" cy="65" r={R}/>
        <circle className="donut-fill"  cx="65" cy="65" r={R}
          strokeDasharray={circ}
          strokeDashoffset={dashOffset}/>
      </svg>
      <div className="donut-center">
        <span className="donut-pct">{displayed}%</span>
        <span className="donut-sub">confidence</span>
      </div>
    </div>
  );
}

/* ── Alternative Row ───────────────────────────── */
function AltRow({ alt, rank }) {
  return (
    <div className="alt-item">
      <span className="alt-rank">#{rank}</span>
      <div className="alt-info">
        <div className="alt-name">{alt.drug}</div>
        <div className="alt-cls">{alt.drug_class}</div>
      </div>
      <div className="alt-right">
        <div className="alt-pct">{alt.confidence.toFixed(1)}%</div>
        <div className="alt-bar">
          <div className="alt-bar-fill" style={{ width: `${Math.min(100, Math.round(alt.confidence))}%` }}/>
        </div>
      </div>
    </div>
  );
}

/* ── Result Panel ──────────────────────────────── */
function ResultPanel({ result, loading }) {
  if (loading) return (
    <div className="empty">
      <div className="empty-icon">
        <div className="spinner" style={{ width:36, height:36, borderWidth:3, borderColor:'rgba(79,70,229,.2)', borderTopColor:'var(--c-primary)' }}/>
      </div>
      <div className="empty-title">Analysing patient data…</div>
      <div className="empty-sub">Running Random Forest across 49 drug classes</div>
    </div>
  );

  if (!result) return (
    <div className="empty">
      <div className="empty-icon">💊</div>
      <div className="empty-title">No prediction yet</div>
      <div className="empty-sub">Fill in the patient parameters and click Predict Drug to get a result.</div>
    </div>
  );

  return (
    <div className="result-in">
      <div className="donut-wrap">
        <Donut pct={result.confidence}/>
      </div>

      <div className="drug-title">{result.drug}</div>
      <div className="tag-row">
        <span className="tag tag-purple">{result.drug_class}</span>
        {result.indication && <span className="tag tag-cyan">{result.indication}</span>}
        <span className="tag tag-green">{result.confidence.toFixed(1)}% confidence</span>
      </div>

      <div className="inner-body">
        <div className="section-title">Clinical Description</div>
        <div className="desc-block">{result.description}</div>

        <div className="section-title">Top 3 Predictions</div>
        <div className="alt-list">
          {result.alternatives.map((a, i) => (
            <AltRow key={i} alt={a} rank={i + 1}/>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ── Main App ──────────────────────────────────── */
function App() {
  const [age,     setAge]     = useState(45);
  const [sex,     setSex]     = useState("M");
  const [bp,      setBp]      = useState("HIGH");
  const [chol,    setChol]    = useState("HIGH");
  const [nak,     setNak]     = useState(18.0);
  const [result,  setResult]  = useState(null);
  const [loading, setLoading] = useState(false);
  const [error,   setError]   = useState("");
  const [mInfo,   setMInfo]   = useState({
    test_accuracy: "97.50", cv_accuracy: "97.25", n_classes: 49, n_trees: 300
  });

  /* Fetch model info on page load */
  useEffect(() => {
    fetch(API + "/model-info")
      .then(r => r.json())
      .then(d => setMInfo(d))
      .catch(() => {});
  }, []);

  /* Slider fill % */
  const sliderFill = `${((nak - 6) / (38.4 - 6)) * 100}%`;

  async function handlePredict() {
    setError("");

    /* client-side validation */
    const ageNum = parseFloat(age);
    if (!age || isNaN(ageNum) || ageNum < 1 || ageNum > 120) {
      setError("Please enter a valid age between 1 and 120."); return;
    }

    setLoading(true);
    setResult(null);
    try {
      const res = await fetch(API + "/predict", {
        method : "POST",
        headers: { "Content-Type": "application/json" },
        body   : JSON.stringify({ age: ageNum, sex, bp, cholesterol: chol, na_to_k: parseFloat(nak) }),
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      setResult(data);
      if (data.model_info) setMInfo(data.model_info);
    } catch (e) {
      setError(
        e.message.includes("fetch") || e.message.includes("Failed")
          ? "Cannot connect to Flask backend. Make sure app.py is running on port 5000."
          : e.message
      );
    } finally {
      setLoading(false);
    }
  }

  return (
    <>
      {/* ── NAVBAR ── */}
      <nav className="navbar">
        <div className="navbar-inner">
          <div className="logo">
            <div className="logo-icon">💊</div>
            <div className="logo-text">Rx<span>AI</span></div>
          </div>
          <div className="navbar-badge">Random Forest · {mInfo.test_accuracy}% Accuracy</div>
        </div>
      </nav>

      {/* ── HERO ── */}
      <div className="hero">
        <div className="hero-pill">
          <div className="hero-pill-dot"/>
          Clinical Decision Support
        </div>
        <h1>AI-Powered <em>Drug</em><br/>Prediction System</h1>
        <p>
          Enter patient vitals — our Random Forest model trained on 1,200
          clinical records predicts the optimal drug with confidence score
          and full clinical description.
        </p>
        <div className="stat-row">
          <div className="stat-item">
            <span className="stat-val">{mInfo.test_accuracy}%</span>
            <span className="stat-lbl">Test Accuracy</span>
          </div>
          <div className="stat-item">
            <span className="stat-val">{mInfo.cv_accuracy}%</span>
            <span className="stat-lbl">CV Accuracy</span>
          </div>
          <div className="stat-item">
            <span className="stat-val">{mInfo.n_classes || 49}</span>
            <span className="stat-lbl">Drug Classes</span>
          </div>
          <div className="stat-item">
            <span className="stat-val">1,200</span>
            <span className="stat-lbl">Training Rows</span>
          </div>
        </div>
      </div>

      {/* ── MAIN GRID ── */}
      <div className="page-wrap">

        {/* INPUT CARD */}
        <div className="card">
          <div className="card-head">
            <div className="card-head-icon">⚕️</div>
            <div>
              <div className="card-head-title">Patient Parameters</div>
              <div className="card-head-sub">5 clinical features · inference ready</div>
            </div>
          </div>
          <div className="card-body">

            {/* Age + Sex */}
            <div className="field-row">
              <div className="field">
                <label className="field-label">Age (years)</label>
                <input
                  className="field-input"
                  type="number" min="1" max="120"
                  value={age}
                  onChange={e => setAge(e.target.value)}
                  placeholder="e.g. 45"
                />
              </div>
              <div className="field">
                <label className="field-label">Biological Sex</label>
                <div className="toggle-row">
                  <button className={`toggle-btn${sex === "M" ? " on" : ""}`} onClick={() => setSex("M")}>
                    ♂ Male
                  </button>
                  <button className={`toggle-btn${sex === "F" ? " on" : ""}`} onClick={() => setSex("F")}>
                    ♀ Female
                  </button>
                </div>
              </div>
            </div>

            {/* BP + Cholesterol */}
            <div className="field-row">
              <div className="field">
                <label className="field-label">Blood Pressure</label>
                <div className="select-wrap">
                  <select className="field-select" value={bp} onChange={e => setBp(e.target.value)}>
                    <option value="HIGH">HIGH</option>
                    <option value="NORMAL">NORMAL</option>
                    <option value="LOW">LOW</option>
                  </select>
                  <span className="select-arrow">▾</span>
                </div>
              </div>
              <div className="field">
                <label className="field-label">Cholesterol</label>
                <div className="select-wrap">
                  <select className="field-select" value={chol} onChange={e => setChol(e.target.value)}>
                    <option value="HIGH">HIGH</option>
                    <option value="NORMAL">NORMAL</option>
                  </select>
                  <span className="select-arrow">▾</span>
                </div>
              </div>
            </div>

            {/* Na/K Slider */}
            <div className="field">
              <div className="nak-header">
                <label className="field-label" style={{ margin: 0 }}>Na / K Ratio</label>
                <span className="nak-num">{parseFloat(nak).toFixed(1)}</span>
              </div>
              <input
                className="slider"
                type="range" min="6" max="38.4" step="0.1"
                value={nak}
                style={{ "--fill": sliderFill }}
                onChange={e => setNak(e.target.value)}
              />
              <div className="nak-scale">
                <span>6.0 — Low K</span>
                <span>22 — Normal</span>
                <span>38.4 — High Na</span>
              </div>
            </div>

            <button className="btn-predict" disabled={loading} onClick={handlePredict}>
              {loading
                ? <><div className="spinner"/> Analysing…</>
                : <>🔬 Predict Drug</>
              }
            </button>

            {error && (
              <div className="error-msg">
                <span>⚠</span>
                <span>{error}</span>
              </div>
            )}
          </div>
        </div>

        {/* RESULT CARD */}
        <div className="card">
          <div className="card-head">
            <div className="card-head-icon">📋</div>
            <div>
              <div className="card-head-title">Prediction Result</div>
              <div className="card-head-sub">
                {result
                  ? `prediction_complete · ${result.confidence.toFixed(1)}% confidence`
                  : "awaiting_input · fill form to predict"}
              </div>
            </div>
          </div>

          <ResultPanel result={result} loading={loading}/>

          <div className="model-bar">
            <div className="mbar-item">Model <span className="mbar-val">RandomForest</span></div>
            <div className="mbar-item">Test Acc <span className="mbar-val">{mInfo.test_accuracy}%</span></div>
            <div className="mbar-item">CV Acc <span className="mbar-val">{mInfo.cv_accuracy}%</span></div>
            <div className="mbar-item">Trees <span className="mbar-val">{mInfo.n_trees || 300}</span></div>
          </div>
        </div>
      </div>

      {/* ── HOW IT WORKS ── */}
      <div className="how-section">
        <h2 className="how-title">How It Works</h2>
        <p className="how-sub">// ml_pipeline · 4-stage process</p>
        <div className="how-grid">
          {[
            ["01","Data Input",        "Patient age, sex, blood pressure, cholesterol and Na/K ratio are entered as the 5 clinical features used by the model."],
            ["02","Feature Encoding",  "Categorical fields (Sex, BP, Cholesterol) are label-encoded. Numerical fields (Age, Na/K) pass directly to the model."],
            ["03","Random Forest",     "300-tree ensemble classifies across 49 drug classes. Each tree votes; majority class wins. 5-fold CV accuracy: 97.25%."],
            ["04","Drug + Confidence", "Predicted drug with confidence score, clinical description, indication, and top-3 alternatives ranked by probability."],
          ].map(([n, title, desc]) => (
            <div className="how-card" key={n}>
              <div className="how-num">{n} / STAGE</div>
              <h3>{title}</h3>
              <p>{desc}</p>
            </div>
          ))}
        </div>
      </div>

      {/* ── FOOTER ── */}
      <footer className="site-footer">
        <div className="site-footer-logo">RxAI</div>
        <div className="site-footer-note">
          Random Forest · 1,200 records · 49 drug classes · 97.5% accuracy · For educational use only
        </div>
      </footer>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
